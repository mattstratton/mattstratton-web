# Netlify build config for the speaking site.
#
# The build is just `astro build` — slide images (WebP) and optimized PDFs are
# generated LOCALLY pre-commit (npm run rasterize / npm run optimize) and committed,
# so the deploy needs no external tools (no poppler, no Ghostscript). This keeps
# the build host-agnostic and fast.
#
# Lives as a subdirectory in a monorepo (see root CLAUDE.md) — this site's Netlify
# project points its Package directory here. Skip a build when a push doesn't
# touch anything under this subdirectory.
[build]
  command = "npm run build"
  publish = "dist"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- mattstratton-speaking"

[build.environment]
  NODE_VERSION = "24"

# Plausible Analytics first-party proxy (https://plausible.io/docs/proxy/guides/netlify).
# The tracker POSTs events to /api/event (see src/components/Analytics.astro), which
# Netlify forwards to Plausible. Keeping it first-party means adblockers can't drop them.
[[redirects]]
  from = "/api/event"
  to = "https://plausible.io/api/event"
  status = 202
  force = true

# Slides + thumbnails are immutable per talk id; cache them hard.
[[headers]]
  for = "/slides/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/thumbnails/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
