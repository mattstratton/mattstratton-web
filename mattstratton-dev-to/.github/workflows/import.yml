name: Import published posts from dev.to
on:
  schedule:
    - cron: "0 13 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
  pull-requests: write
jobs:
  import:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mattstratton-dev-to
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Import new published posts
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: npx tsx scripts/import.ts
      - name: Open PR if anything new
        uses: peter-evans/create-pull-request@v6
        with:
          branch: import/devto-sync
          title: "Import newly published dev.to posts"
          commit-message: "chore: import newly published dev.to posts"
          body: "Auto-generated by the importer. Review and merge to take ownership in git."
          add-paths: mattstratton-dev-to/posts/**
