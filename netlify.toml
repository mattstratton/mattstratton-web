# Netlify build config for mattstratton.com (Astro).
#
# Replaces the previous Hugo build (bin/netlify*.sh + HUGO_VERSION). The build is
# just `astro build`; redirects live in public/_redirects.
#
# This repo is a monorepo (see root CLAUDE.md) — mattstratton-speaking/ and
# mattstratton-dev-to/ are independent sibling subprojects with their own Netlify
# site / GitHub Actions respectively.
#
# Previously had a custom `ignore` command that diffed against
# $CACHED_COMMIT_REF to skip this build when a push only touched those
# subdirectories. Removed 2026-07-06: in this repo's merge history (a real
# 2-parent `git merge`, not a path-rewritten `git subtree` graft — see root
# CLAUDE.md), $CACHED_COMMIT_REF was observed resolving in a way that made
# the diff come back empty even for commits that demonstrably changed files
# under this path, silently skipping a build that should have run (PR #64).
# Root-caused as unreliable rather than fixed; correctness (always deploying
# real changes) matters more here than skipping the occasional unrelated
# rebuild, so this site now just builds on every push.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

# Generated OG cards are immutable per page; cache them hard.
[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
