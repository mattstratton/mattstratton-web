# Netlify build config for the speaking site.
#
# The build is just `astro build` — slide images (WebP) and optimized PDFs are
# generated LOCALLY pre-commit (npm run rasterize / npm run optimize) and committed,
# so the deploy needs no external tools (no poppler, no Ghostscript). This keeps
# the build host-agnostic and fast.
#
# Lives as a subdirectory in a monorepo (see root CLAUDE.md) — this site's Netlify
# project points its Package directory here.
#
# Previously had a custom `ignore` command that diffed against
# $CACHED_COMMIT_REF to skip this build when a push didn't touch this
# subdirectory. Removed 2026-07-06: in this repo's merge history (a real
# 2-parent `git merge`, not a path-rewritten `git subtree` graft — see root
# CLAUDE.md), $CACHED_COMMIT_REF was observed resolving in a way that made
# the diff come back empty even for commits that demonstrably changed files
# under this path, silently skipping a build that should have run (PR #64).
# Root-caused as unreliable rather than fixed; correctness (always deploying
# real changes) matters more here than skipping the occasional unrelated
# rebuild, so this site now just builds on every push.
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

# Plausible Analytics first-party proxy (https://plausible.io/docs/proxy/guides/netlify).
# The tracker POSTs events to /api/event (see src/components/Analytics.astro), which
# Netlify forwards to Plausible. Keeping it first-party means adblockers can't drop them.
[[redirects]]
  from = "/api/event"
  to = "https://plausible.io/api/event"
  status = 202
  force = true

# Slides + thumbnails are immutable per talk id; cache them hard.
[[headers]]
  for = "/slides/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/thumbnails/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
