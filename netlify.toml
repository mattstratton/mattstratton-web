# Netlify build config for mattstratton.com (Astro).
#
# Replaces the previous Hugo build (bin/netlify*.sh + HUGO_VERSION). The build is
# just `astro build`; redirects live in public/_redirects.
#
# This repo is a monorepo (see root CLAUDE.md) — mattstratton-speaking/ and
# mattstratton-dev-to/ are independent sibling subprojects with their own Netlify
# site / GitHub Actions respectively. Skip this site's build when a push only
# touches those subdirectories.
#
# The `[ "$CACHED_COMMIT_REF" = "$COMMIT_REF" ]` guard forces a build (exit 1)
# when there's no meaningful previous ref to diff against — e.g. a brand-new
# branch's first deploy preview, where Netlify has been observed falling back
# to $CACHED_COMMIT_REF == $COMMIT_REF, making the diff trivially empty and
# silently skipping a build that should have run.
[build]
  command = "npm run build"
  publish = "dist"
  ignore = "[ \"$CACHED_COMMIT_REF\" = \"$COMMIT_REF\" ] && exit 1 || git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':(exclude)mattstratton-speaking' ':(exclude)mattstratton-dev-to'"

[build.environment]
  NODE_VERSION = "24"

# Generated OG cards are immutable per page; cache them hard.
[[headers]]
  for = "/og/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
